<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EpicQuest</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="debuff-overlay" class="debuff-warning hidden"></div>
    
    <div id="app-container">
        <header class="hero-hud">
            <div class="hud-row top-row">
                <div class="avatar-info">
                    <span id="hero-avatar" class="avatar">🧙‍♂️</span>
                    <span id="hero-name" class="nickname">Hero</span>
                    <span class="level">Lv. <span id="hero-level">1</span></span>
                </div>
                <div id="countdown-timer" class="timer">00:00:00</div>
            </div>
            <div class="hud-row bars-row">
                <div class="bar-container hp-container">
                    <div id="hp-bar" class="bar-fill hp-fill"></div>
                    <span class="bar-text">HP: <span id="hp-text">100/100</span></span>
                </div>
                <div class="bar-container exp-container">
                    <div id="exp-bar" class="bar-fill exp-fill"></div>
                    <span class="bar-text">EXP: <span id="exp-text">0/100</span></span>
                </div>
            </div>
            <div class="hud-row gold-row">
                <span class="gold-display">💰 <span id="hero-gold">0</span></span>
            </div>
        </header>

        <main id="main-content">
            <div id="page-quests" class="page-content active">
                <div class="input-section">
                    <input type="text" id="new-quest-title" placeholder="What is your quest?">
                    <input type="number" id="new-quest-gold" placeholder="G" value="10">
                    <button id="add-quest-btn" class="btn">Add Quest</button>
                </div>
                
                <h2 class="section-title">Active Quests</h2>
                <div id="quest-list" class="list-container"></div>
                
                <h2 class="section-title">Tomorrow's Plan</h2>
                <div id="tomorrow-list" class="list-container"></div>
            </div>

            <div id="page-shop" class="page-content">
                <h2 class="section-title">Merchant's Wares</h2>
                <div id="shop-list" class="grid-container"></div>
            </div>

            <div id="page-profile" class="page-content">
                <h2 class="section-title">Hero's Profile</h2>
                <div class="profile-stats">
                    <p>Total EXP: <span id="stat-total-exp">0</span></p>
                    <p>Quests Completed: <span id="stat-quests">0</span></p>
                    <div class="survival-settings">
                        <label for="difficulty-slider">Vitality Decay (HP/day): <span id="difficulty-val">24</span></label>
                        <input type="range" id="difficulty-slider" min="0" max="100" value="24">
                    </div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active" data-target="page-quests">⚔️ Quests</button>
            <button class="nav-btn" data-target="page-shop">💰 Shop</button>
            <button class="nav-btn" data-target="page-profile">👤 Profile</button>
        </nav>

        <div id="epic-toast" class="toast hidden"></div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
